# 完整一包:palworld 遊戲伺服器 + 這份 dashboard(含 Settings 頁面),一起用 docker compose 啟動。
# - palworld service 完全沒改,直接吃官方 image
# - dashboard service 是唯一被改的部分:用這個 repo 的原始碼 build,而不是拉發布好的 image
#
# 用法:
#   git clone 這個 repo,在 repo 根目錄執行
#   docker compose -f docker-compose.full.yml up -d --build
#
# 密碼一律從同層的 .env 檔讀(不會被 git 追蹤),照 .env.example 複製一份改成自己的值。
# PALWORLD_ADMIN_PASSWORD 只在首次開機生成 ini 時使用; lock 後 REST API 密碼以
# PalWorldSettings.ini 的 AdminPassword 為準,改 .env 不會更新已鎖的 ini。
#
# 建議直接跑 ./scripts/deploy-full.sh,它會處理「先讓 image 生成一次真正的
# ini(此時不能鎖),等伺服器 healthy 後再鎖住 ini 不被覆蓋」這個兩階段開機
# 流程,並自動切換下面 DISABLE_GENERATE_SETTINGS 的值、只在需要時重建一次。
# 手動操作或除錯時可以參考 README「Run Server and Dashboard Together」段落。

services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    restart: unless-stopped
    container_name: palworld-server
    stop_grace_period: 60s
    # 用開機 hook 包住官方 image 的原始 entrypoint(/home/steam/server/init.sh):
    # 每次容器啟動時,先讓 apply-pending.sh 把 dashboard 佇列的設定套進 ini,
    # 再交棒給官方流程啟動 PalServer。這樣改設定不需要 docker socket、不需要
    # 精準抓關機時序,徹底避開引擎回寫的競爭。詳見 palworld-hook/apply-pending.sh。
    entrypoint: ["/bin/bash", "/opt/hooks/apply-pending.sh"]
    ports:
      - 8211:8211/udp
    environment:
      PORT: 8211
      PLAYERS: 10
      MULTITHREADING: true
      RCON_ENABLED: true
      REST_API_ENABLED: true
      REST_API_PORT: 8212
      SERVER_PASSWORD: "${PALWORLD_SERVER_PASSWORD}"
      ADMIN_PASSWORD: "${PALWORLD_ADMIN_PASSWORD}"
      SERVER_NAME: "${PALWORLD_SERVER_NAME}"
      COMMUNITY: false
      BACKUP_ENABLED: true
      BACKUP_CRON_EXPRESSION: "0 */6 * * *"
      DELETE_OLD_BACKUPS: true
      OLD_BACKUP_DAYS: 7
      AUTO_UPDATE_CRON_EXPRESSION: "0 4 * * *"
      AUTO_REBOOT_CRON_EXPRESSION: "0 5 * * *"
      AUTO_REBOOT_EVEN_IF_PLAYERS_ONLINE: false
      EXP_RATE: 1.5
      PAL_CAPTURE_RATE: 2.0
      PAL_SPAWN_NUM_RATE: 1.0
      PLAYER_STAMINA_DECREASE_RATE: 0.8
      COLLECTION_DROP_RATE: 1.5
      ENEMY_DROP_ITEM_RATE: 1.5
      PAL_EGG_DEFAULT_HATCHING_TIME: 0.3
      WORK_SPEED_RATE: 1.5
      DEATH_PENALTY: "None"
      # Engine.ini,所以不像 DISABLE_GENERATE_SETTINGS 那樣需要之後鎖住,固定開著就好。
      DISABLE_GENERATE_ENGINE: false
      # 由 scripts/deploy-full.sh 或 .env 控制,首次開機必須是 false(見上方說明)
      DISABLE_GENERATE_SETTINGS: ${DISABLE_GENERATE_SETTINGS:-false}
    volumes:
      - ./data:/palworld/
      # 開機 hook 腳本(唯讀掛入),被上面的 entrypoint 呼叫
      - ./palworld-hook/apply-pending.sh:/opt/hooks/apply-pending.sh:ro
    cap_add:
      - SYS_NICE

  dashboard:
    build: .   # 用這個 repo 的原始碼 build,不是拉 image
    container_name: palworld-server-dashboard
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./data/Pal/Saved/Config/LinuxServer:/config:rw   # 跟 palworld 服務共用同一個 ./data,掛進 ini 檔所在資料夾
    # 蓋掉 Dockerfile 裡預設的 uid 1001(nextjs),改用跟 palworld 產生 ini 檔時同一個 uid,
    # 不然 dashboard 對這個 volume 只有讀權限,寫入/備份 ini 會 EACCES。
    # thijsvanloef image 預設用 uid 1000,大部分 Linux 主機的第一個使用者也剛好是 1000,
    # 如果你的 ./data 資料夾擁有者不是 1000,改 .env 裡的 PALWORLD_UID/PALWORLD_GID。
    user: "${PALWORLD_UID:-1000}:${PALWORLD_GID:-1000}"
    environment:
      PALWORLD_INI_PATH: /config/PalWorldSettings.ini
      SETTINGS_EDITOR_PASSWORD: "${SETTINGS_EDITOR_PASSWORD}"   # 唯一保護寫檔案這個動作的關卡
